<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>The King's Ladder — RHC Tournament</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>
<script src="https://cdn.tailwindcss.com"></script>
<style>body{margin:0}</style>
</head>
<body>
<div id="root"></div>
<script>
const appStorage = {
  async get(key){ const v=localStorage.getItem(key); if(v===null) throw new Error("not found"); return {key,value:v}; },
  async set(key,value){ localStorage.setItem(key,value); return {key,value}; },
  async delete(key){ localStorage.removeItem(key); return {key,deleted:true}; },
};
</script>
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const C = {
  ink: "#122E22",
  green: "#33604B",
  greenDeep: "#1E4234",
  gold: "#C9A85C",
  goldSoft: "#E4D3A2",
  chalk: "#F6F2E7",
  line: "#DAD2BE",
  clay: "#B4432F",
};

const STORAGE_KEY = "rhc-kings-ladder-v1";
const RECORDS_KEY = "rhc-ladder-records-v1";

// Within a ranked pod of 4 (seeds 0..3), rotate partner pairings by round
// so the same two players don't always team up.
const POD_PATTERNS = [
  [[0, 3], [1, 2]],
  [[0, 2], [1, 3]],
  [[0, 1], [2, 3]],
];

const COURT_NAMES = ["Championship Court", "Court 2", "Court 3", "Court 4"];

function KingsLadder() {
  const [phase, setPhase] = useState("setup"); // setup | play | done
  const [count, setCount] = useState(16);
  const [names, setNames] = useState(Array(16).fill(""));
  const [players, setPlayers] = useState([]);
  const [numRounds, setNumRounds] = useState(5);
  const [rounds, setRounds] = useState([]); // rounds[r] = [pod, pod, pod, pod]; pod = {seats:[p..], teams:[[i,j],[k,l]], a:'', b:''}
  const [cur, setCur] = useState(0);
  const [records, setRecords] = useState(null);
  const [logged, setLogged] = useState(false);
  const [loaded, setLoaded] = useState(false);
  const [confirmReset, setConfirmReset] = useState(false);
  const [booth, setBooth] = useState("");
  const [boothTitle, setBoothTitle] = useState("");
  const saveTimer = useRef(null);

  // ---------- persistence ----------
  const loadSaved = async () => {
    try {
      const res = await appStorage.get(STORAGE_KEY, true);
      if (res && res.value) {
        const s = JSON.parse(res.value);
        if (s.players && s.players.length >= 8 && s.phase !== "setup") {
          setPhase(s.phase);
          setCount(s.players.length);
          setPlayers(s.players);
          setNumRounds(s.numRounds || 5);
          setRounds(s.rounds || []);
          setCur(s.cur || 0);
          setLogged(!!s.logged);
          return true;
        }
      }
    } catch (e) {}
    return false;
  };
  const loadRecords = async () => {
    try {
      const res = await appStorage.get(RECORDS_KEY, true);
      if (res && res.value) setRecords(JSON.parse(res.value));
    } catch (e) {}
  };
  useEffect(() => {
    (async () => { await loadSaved(); await loadRecords(); setLoaded(true); })();
  }, []);
  useEffect(() => {
    if (!loaded || phase === "setup") return;
    if (saveTimer.current) clearTimeout(saveTimer.current);
    saveTimer.current = setTimeout(async () => {
      try {
        await appStorage.set(STORAGE_KEY, JSON.stringify({ phase, players, numRounds, rounds, cur, logged, count }), true);
      } catch (e) {}
    }, 500);
    return () => saveTimer.current && clearTimeout(saveTimer.current);
  }, [phase, players, numRounds, rounds, cur, logged, loaded]);

  // ---------- scoring helpers ----------
  const parsed = (v) => { const n = parseInt(v, 10); return Number.isFinite(n) && n >= 0 ? n : null; };
  const podDone = (pod) => {
    const a = parsed(pod.a), b = parsed(pod.b);
    return a !== null && b !== null && a !== b;
  };
  const roundPods = (r) => (rounds[r] ? rounds[r].pods : []);
  const roundByes = (r) => (rounds[r] ? rounds[r].byes || [] : []);
  const roundDone = (r) => rounds[r] && roundPods(r).every(podDone);

  // standings across all completed pods up to (and including) round limit
  const computeStandings = (limit) => {
    const rows = players.map((p, i) => ({ i, name: p, w: 0, l: 0, pf: 0, pa: 0, gp: 0 }));
    rounds.forEach((round, r) => {
      if (limit !== undefined && r > limit) return;
      round.pods.forEach((pod) => {
        if (!podDone(pod)) return;
        const a = parsed(pod.a), b = parsed(pod.b);
        const aWon = a > b;
        pod.teams[0].forEach((p) => { rows[p].pf += a; rows[p].pa += b; rows[p].gp++; aWon ? rows[p].w++ : rows[p].l++; });
        pod.teams[1].forEach((p) => { rows[p].pf += b; rows[p].pa += a; rows[p].gp++; aWon ? rows[p].l++ : rows[p].w++; });
      });
    });
    rows.forEach((r) => { r.diff = r.pf - r.pa; r.pct = r.gp ? r.w / r.gp : 0; });
    // win% first (fair when bye counts differ), then diff, then points for
    rows.sort((x, y) => y.pct - x.pct || y.diff - x.diff || y.pf - x.pf);
    return rows;
  };
  const standings = computeStandings();

  // byes taken so far, per player, from round history
  const byeCounts = () => {
    const c = players.map(() => 0);
    rounds.forEach((rd) => (rd.byes || []).forEach((p) => c[p]++));
    return c;
  };

  // ---------- partner / opponent history ----------
  // Counts how often each pair has partnered and opposed, from completed rounds.
  const history = () => {
    const P = {}, O = {};
    players.forEach((_, i) => { P[i] = {}; O[i] = {}; });
    rounds.forEach((rd) => rd.pods.forEach((pod) => {
      pod.teams.forEach((tm) => {
        P[tm[0]][tm[1]] = (P[tm[0]][tm[1]] || 0) + 1;
        P[tm[1]][tm[0]] = (P[tm[1]][tm[0]] || 0) + 1;
      });
      pod.teams[0].forEach((x) => pod.teams[1].forEach((y) => {
        O[x][y] = (O[x][y] || 0) + 1;
        O[y][x] = (O[y][x] || 0) + 1;
      }));
    }));
    return { P, O };
  };

  // For a foursome, score each of the 3 possible pairings.
  // Repeat partners cost heavily; repeat opponents are a light tiebreaker.
  const podCost = (seats, pat, P, O) => {
    const t = [
      [seats[pat[0][0]], seats[pat[0][1]]],
      [seats[pat[1][0]], seats[pat[1][1]]],
    ];
    let c = 0;
    t.forEach((tm) => { c += 1000 * ((P[tm[0]] && P[tm[0]][tm[1]]) || 0); });
    t[0].forEach((x) => t[1].forEach((y) => { c += (O[x] && O[x][y]) || 0; }));
    return { c, teams: t };
  };
  const bestPattern = (seats, P, O) => {
    let best = null;
    POD_PATTERNS.forEach((pat) => {
      const r = podCost(seats, pat, P, O);
      if (!best || r.c < best.c) best = r;
    });
    return best;
  };

  // ---------- round generation ----------
  const makeRound = (rankedRows, roundNo, priorByes) => {
    const { P, O } = history();
    const ranked = rankedRows.map((r) => r.i);
    const n = ranked.length;
    const courts = Math.floor(n / 4);
    const numByes = n - courts * 4;
    let byes = [];
    if (numByes > 0) {
      // fewest byes so far keep playing; among equals, lower-ranked sits
      const cand = ranked.map((p, idx) => ({ p, idx, by: priorByes[p] }));
      cand.sort((x, y) => x.by - y.by || y.idx - x.idx);
      byes = cand.slice(0, numByes).map((c) => c.p);
    }
    let inPlay = ranked.filter((p) => !byes.includes(p));

    // Only players with IDENTICAL records may swap courts, so placement
    // still reflects exactly how you're playing.
    const key = {};
    rankedRows.forEach((r) => { key[r.i] = `${r.pct}|${r.diff}|${r.pf}`; });
    const podStart = (i) => Math.floor(i / 4) * 4;
    for (let pass = 0; pass < 2; pass++) {
      for (let i = 0; i < inPlay.length; i++) {
        const si = podStart(i);
        const podI = inPlay.slice(si, si + 4);
        if (podI.length < 4) continue;
        const curCost = bestPattern(podI, P, O).c;
        if (curCost < 1000) continue; // no repeat partners here
        for (let j = 0; j < inPlay.length; j++) {
          const sj = podStart(j);
          if (sj === si) continue;
          const podJ = inPlay.slice(sj, sj + 4);
          if (podJ.length < 4) continue;
          if (key[inPlay[i]] !== key[inPlay[j]]) continue;
          const before = curCost + bestPattern(podJ, P, O).c;
          const t = [...inPlay];
          [t[i], t[j]] = [t[j], t[i]];
          const after = bestPattern(t.slice(si, si + 4), P, O).c + bestPattern(t.slice(sj, sj + 4), P, O).c;
          if (after < before) { inPlay = t; break; }
        }
      }
    }

    const pods = [];
    for (let i = 0; i < inPlay.length; i += 4) {
      const seats = inPlay.slice(i, i + 4);
      const b = bestPattern(seats, P, O);
      pods.push({ seats, teams: b.teams, a: "", b: "" });
    }
    return { pods, byes };
  };

  // ---------- actions ----------
  const start = () => {
    const trimmed = Array.from({ length: count }, (_, i) => (names[i] || "").trim() || `Player ${i + 1}`);
    setPlayers(trimmed);
    const rows0 = trimmed.map((_, i) => ({ i, pct: 0, diff: 0, pf: 0 }));
    const r1 = makeRound(rows0, 0, trimmed.map(() => 0));
    setRounds([r1]);
    setCur(0);
    setLogged(false);
    setBooth(""); setBoothTitle("");
    setPhase("play");
  };

  const advance = () => {
    if (!roundDone(cur)) return;
    if (cur + 1 >= numRounds) { setPhase("done"); return; }
    const next = makeRound(computeStandings(cur), cur + 1, byeCounts());
    setRounds((prev) => [...prev, next]);
    setCur(cur + 1);
    setBooth(""); setBoothTitle("");
  };

  const setScore = (podIdx, side, val) => {
    if (val !== "" && !/^\d{0,2}$/.test(val)) return;
    setRounds((prev) => {
      const next = prev.map((rd) => ({ ...rd, pods: rd.pods.map((p) => ({ ...p })) }));
      next[cur].pods[podIdx][side] = val;
      return next;
    });
  };

  const resetAll = async () => {
    if (!confirmReset) { setConfirmReset(true); setTimeout(() => setConfirmReset(false), 4000); return; }
    try { await appStorage.delete(STORAGE_KEY, true); } catch (e) {}
    setConfirmReset(false);
    setPhase("setup"); setPlayers([]); setRounds([]); setCur(0); setLogged(false);
    setBooth(""); setBoothTitle(""); setCount(16); setNames(Array(16).fill(""));
  };

  // ---------- records ----------
  const topTies = (rows) => rows.filter((p) => p.w === rows[0].w && p.diff === rows[0].diff && p.pf === rows[0].pf);
  const logResults = async () => {
    if (phase !== "done" || logged) return;
    try {
      let rec = { players: {}, history: [] };
      try { const res = await appStorage.get(RECORDS_KEY, true); if (res && res.value) rec = JSON.parse(res.value); } catch (e) {}
      if (!rec.players) rec.players = {};
      if (!rec.history) rec.history = [];
      const champs = topTies(standings).map((p) => p.name.trim().toLowerCase());
      standings.forEach((p) => {
        const key = p.name.trim().toLowerCase();
        const r = rec.players[key] || { name: p.name.trim(), w: 0, l: 0, pf: 0, pa: 0, titles: 0, events: 0, podium: 0 };
        r.w += p.w; r.l += p.l; r.pf += p.pf; r.pa += p.pa; r.events += 1;
        if (champs.includes(key)) r.titles += 1;
        const rank = standings.findIndex((s) => s.i === p.i);
        if (rank < 3) r.podium += 1;
        rec.players[key] = r;
      });
      rec.history.unshift({
        date: new Date().toLocaleDateString("en-US", { month: "short", day: "numeric", year: "numeric" }),
        champion: topTies(standings).map((p) => p.name).join(" & "),
        rounds: numRounds,
      });
      if (rec.history.length > 50) rec.history = rec.history.slice(0, 50);
      await appStorage.set(RECORDS_KEY, JSON.stringify(rec), true);
      setRecords(rec);
      setLogged(true);
    } catch (e) {}
  };
  const recordRows = records && records.players    ? Object.values(records.players).sort((x, y) => y.titles - x.titles || y.w - x.w || (y.w / Math.max(1, y.w + y.l)) - (x.w / Math.max(1, x.w + x.l)))
    : [];

  // ---------- commentary (local, no network) ----------
  const pick = (a) => a[Math.floor(Math.random() * a.length)];
  const tName = (t) => t.map((p) => players[p]).join(" & ");
  const previewRound = () => {
    const champPod = roundPods(cur)[0];
    const sitting = roundByes(cur).map((p) => players[p]);
    const lines = [
      pick([
        `Round ${cur + 1} at River Hills, and the ladder has done its work — the cream has risen.`,
        `We're underway with Round ${cur + 1}, and if you want to know who's playing well, just look at who's on the top court.`,
      ]),
      `Up on the Championship Court: ${tName(champPod.teams[0])} against ${tName(champPod.teams[1])} — winner takes the inside track.`,
    ];
    if (cur > 0) {
      const l = standings[0];
      lines.push(`${l.name} sits atop the standings at ${l.w}–${l.l}, but a ladder is a cruel thing — one bad game and you're sliding down a court.`);
    }
    if (sitting.length) lines.push(`Drawing a bye this round: ${sitting.join(", ")} — rest up, you're back in it next round.`);
    lines.push(pick([
      `Every court matters — climb one rung a round and you're in the title hunt by the finish.`,
      `Down at the bottom, pride's on the line and nobody wants to close the night in the cellar.`,
    ]));
    setBoothTitle(`Round ${cur + 1} Preview`);
    setBooth(lines.join(" "));
  };
  const recap = () => {
    const champ = standings[0];
    const runner = standings[1];
    const cellar = standings[standings.length - 1];
    const lines = [
      pick([
        `Ballgame at River Hills. After ${numRounds} rounds of climbing, ${champ.name} stands alone at ${champ.w}–${champ.l} — King of the Ladder.`,
        `The ladder has spoken: ${champ.name} takes the crown at ${champ.w}–${champ.l}, ${champ.diff >= 0 ? "+" : ""}${champ.diff} on the day.`,
      ]),
      `${runner.name} pushed to the end and settled for the runner-up chair at ${runner.w}–${runner.l}.`,
      pick([
        `And somebody's buying first round — ${cellar.name} closes out on Court 4 at ${cellar.w}–${cellar.l}. It builds character.`,
        `Spare a thought for ${cellar.name}, ${cellar.w}–${cellar.l}, who found the cellar and the humility that comes with it.`,
      ]),
    ];
    setBoothTitle("Final Recap");
    setBooth(lines.join(" "));
  };

  // ---------- UI ----------
  const partnerVariety = (() => {
    if (!players.length) return null;
    const { P } = history();
    const counts = players.map((_, i) => Object.keys(P[i] || {}).length);
    const played = players.map((_, i) => Object.values(P[i] || {}).reduce((a, b) => a + b, 0));
    if (!played.some((x) => x > 0)) return null;
    return { min: Math.min(...counts), max: Math.max(...counts), counts };
  })();
  const font = { display: "'Playfair Display', Georgia, serif", body: "'Barlow', 'Helvetica Neue', sans-serif" };
  const champs = phase === "done" ? topTies(standings) : [];

  const Crest = ({ size = 64 }) => (
    <svg width={size} height={size} viewBox="0 0 100 100" role="img" aria-label="RHC crest" className="flex-shrink-0">
      <circle cx="50" cy="50" r="47" fill={C.greenDeep} stroke={C.gold} strokeWidth="3" />
      <circle cx="50" cy="50" r="39" fill="none" stroke={C.gold} strokeWidth="1.2" />
      <text x="50" y="56" textAnchor="middle" fontFamily="'Playfair Display', Georgia, serif" fontSize="27" fontWeight="700" fill={C.gold} letterSpacing="1.5">RHC</text>
      <text x="50" y="71" textAnchor="middle" fontFamily="'Barlow', sans-serif" fontSize="8.5" fill={C.chalk} letterSpacing="2.5">EST. 1964</text>
    </svg>
  );

  const Rung = () => (
    <div className="flex items-center gap-0 my-6" aria-hidden="true">
      <div style={{ height: 3, background: C.green }} className="flex-1" />
      <div style={{ height: 12, width: 12, background: C.gold, border: `2px solid ${C.ink}`, transform: "rotate(45deg)" }} className="mx-2" />
      <div style={{ height: 3, background: C.green }} className="flex-1" />
    </div>
  );

  const StandingsTable = ({ limitLeaderHighlight }) => (
    <div style={{ background: "#fff", border: `2px solid ${C.ink}` }} className="rounded overflow-hidden">
      <div style={{ background: C.ink, color: C.chalk, fontFamily: font.display }} className="grid grid-cols-12 px-3 py-2 text-xs font-bold uppercase tracking-wider">
        <div className="col-span-1">#</div>
        <div className="col-span-5">Player</div>
        <div className="col-span-2 text-center">W–L</div>
        <div className="col-span-2 text-center">Diff</div>
        <div className="col-span-2 text-center">PF</div>
      </div>
      {standings.map((r, idx) => {
        const onPodium = phase === "done" && idx < 3;
        const isChamp = phase === "done" && champs.some((c) => c.i === r.i);
        return (
          <div key={r.i} style={{ background: isChamp ? C.gold : onPodium ? "#EFE7CF" : "transparent", borderTop: `1px solid ${C.line}` }} className="grid grid-cols-12 px-3 py-2.5 text-sm items-center">
            <div style={{ fontFamily: font.display }} className="col-span-1 font-bold">{idx + 1}</div>
            <div className="col-span-5 font-semibold truncate">
              {r.name}
              {isChamp && <span className="ml-1" role="img" aria-label="champion">👑</span>}
              {phase === "done" && idx === 1 && <span className="ml-1" role="img" aria-label="runner up">🥈</span>}
              {phase === "done" && idx === 2 && <span className="ml-1" role="img" aria-label="third">🥉</span>}
            </div>
            <div className="col-span-2 text-center">{r.w}–{r.l}</div>
            <div className="col-span-2 text-center">{r.diff >= 0 ? "+" : ""}{r.diff}</div>
            <div className="col-span-2 text-center">{r.pf}</div>
          </div>
        );
      })}
    </div>
  );

  const ClubRecords = () => (
    <section className="mt-8">
      <h2 style={{ fontFamily: font.display }} className="text-2xl font-bold uppercase">Ladder records</h2>
      <p className="text-xs mt-1" style={{ color: "#5A6478" }}>
        All-time across every logged tournament. Keep name spellings consistent to connect careers.
      </p>
      {recordRows.length === 0 ? (
        <div style={{ background: "#fff", border: `2px dashed ${C.line}` }} className="mt-3 rounded px-4 py-5 text-center">
          <div style={{ fontFamily: font.display }} className="font-bold uppercase text-sm">No tournaments logged yet</div>
          <p className="text-xs mt-1" style={{ color: "#5A6478" }}>
            Finish a tournament and tap “Log results” on the final screen. Titles, records, and podium finishes build from there.
          </p>
        </div>
      ) : (
        <>
          <div style={{ background: "#fff", border: `2px solid ${C.ink}` }} className="mt-3 rounded overflow-hidden">
            <div style={{ background: C.greenDeep, color: C.chalk, fontFamily: font.display }} className="grid grid-cols-12 px-3 py-2 text-xs font-bold uppercase tracking-wider">
              <div className="col-span-4">Player</div>
              <div className="col-span-1 text-center">Ev</div>
              <div className="col-span-3 text-center">W–L</div>
              <div className="col-span-2 text-center">Win%</div>
              <div className="col-span-1 text-center">👑</div>
              <div className="col-span-1 text-center">★</div>
            </div>
            {recordRows.map((r) => (
              <div key={r.name} style={{ borderTop: `1px solid ${C.line}` }} className="grid grid-cols-12 px-3 py-2.5 text-sm items-center">
                <div className="col-span-4 font-semibold truncate">{r.name}</div>
                <div className="col-span-1 text-center">{r.events}</div>
                <div className="col-span-3 text-center">{r.w}–{r.l}</div>
                <div className="col-span-2 text-center">{Math.round((r.w / Math.max(1, r.w + r.l)) * 100)}%</div>
                <div style={{ fontFamily: font.display }} className="col-span-1 text-center font-bold">{r.titles || "—"}</div>
                <div style={{ fontFamily: font.display }} className="col-span-1 text-center font-bold">{r.podium || "—"}</div>
              </div>
            ))}
          </div>
          <p className="text-xs mt-1" style={{ color: "#5A6478" }}>👑 titles · ★ podium finishes (top 3)</p>
          {records && records.history && records.history.length > 0 && (
            <div className="mt-4">
              <h3 style={{ fontFamily: font.display }} className="text-lg font-bold uppercase">Past champions</h3>
              <div style={{ background: "#fff", border: `2px solid ${C.line}` }} className="mt-2 rounded overflow-hidden">
                {records.history.map((h, i) => (
                  <div key={i} style={{ borderTop: i > 0 ? `1px solid ${C.line}` : "none" }} className="px-3 py-2.5 text-sm flex items-center justify-between">
                    <span style={{ fontFamily: font.display }} className="font-bold">{h.date}</span>
                    <span className="font-semibold">👑 {h.champion} <span style={{ color: "#5A6478" }} className="text-xs">· {h.rounds} rounds</span></span>
                  </div>
                ))}
              </div>
            </div>
          )}
        </>
      )}
    </section>
  );

  return (
    <div style={{ background: C.chalk, minHeight: "100vh", fontFamily: font.body, color: C.ink }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700;800&family=Barlow:wght@400;500;600&display=swap');
        input:focus, button:focus { outline: 3px solid ${C.gold}; outline-offset: 2px; }
        @media (prefers-reduced-motion: reduce){ * { transition:none !important; } }
      `}</style>

      <header style={{ background: C.ink, borderBottom: `4px solid ${C.gold}` }} className="px-5 py-6">
        <div className="max-w-3xl mx-auto flex items-center gap-4">
          <Crest />
          <div>
            <div style={{ color: C.gold, fontFamily: font.display, letterSpacing: "0.2em" }} className="text-xs font-bold uppercase">River Hills Club · Ladder Tournament</div>
            <h1 style={{ fontFamily: font.display, color: C.chalk, lineHeight: 1.05 }} className="text-3xl font-extrabold uppercase mt-1">The King’s Ladder</h1>
            <div style={{ color: "#9DB5A6" }} className="text-sm mt-1.5">Everyone plays every round. Climb the courts. Crown a champion.</div>
          </div>
        </div>
      </header>

      <main className="max-w-3xl mx-auto px-5 pb-16">
        {/* SETUP */}
        {phase === "setup" && (
          <section className="pt-8">
            <h2 style={{ fontFamily: font.display }} className="text-2xl font-bold uppercase">How it works</h2>
            <p className="text-sm mt-2" style={{ color: "#3C4A40" }}>
              Pick your field, then each round you’re matched with three others at your level for one game to 11.
              Win and you climb toward the Championship Court; lose and you slide down — but you never sit out for good and you’re never eliminated.
              After the final round, the best record is King of the Ladder.
            </p>

            <div className="mt-5">
              <div style={{ fontFamily: font.display }} className="text-sm font-bold uppercase">Field size</div>
              <div className="flex gap-2.5 mt-2 items-center">
                {[8, 12, 16].map((n) => (
                  <button key={n} onClick={() => { setCount(n); setNames((prev) => { const a = [...prev]; a.length = Math.max(a.length, n); return a.map((x) => x || ""); }); }}
                    style={{ fontFamily: font.display, background: count === n ? C.green : "transparent", color: count === n ? C.chalk : C.ink, border: `2px solid ${C.green}` }}
                    className="px-5 py-2 text-lg font-bold uppercase rounded">
                    {n}
                  </button>
                ))}
                <div className="flex items-center gap-2 ml-1">
                  <button onClick={() => setCount(Math.max(8, count - 1))} aria-label="one fewer player"
                    style={{ border: `2px solid ${C.line}`, fontFamily: font.display }} className="w-10 h-10 rounded text-xl font-bold">–</button>
                  <span style={{ fontFamily: font.display, minWidth: 28 }} className="text-xl font-bold text-center">{count}</span>
                  <button onClick={() => setCount(Math.min(16, count + 1))} aria-label="one more player"
                    style={{ border: `2px solid ${C.line}`, fontFamily: font.display }} className="w-10 h-10 rounded text-xl font-bold">+</button>
                </div>
              </div>
              <p className="text-xs mt-2" style={{ color: "#5A6478" }}>
                {count % 4 === 0
                  ? `${count / 4} courts, no byes — everyone plays every round.`
                  : `${Math.floor(count / 4)} courts · ${count % 4} ${count % 4 === 1 ? "player sits" : "players sit"} each round (byes rotate fairly).`}
              </p>
            </div>

            <div className="mt-5">
              <div style={{ fontFamily: font.display }} className="text-sm font-bold uppercase">Rounds</div>
              <div className="flex gap-3 mt-2">
                {[5, 6].map((n) => (
                  <button key={n} onClick={() => setNumRounds(n)}
                    style={{ fontFamily: font.display, background: numRounds === n ? C.green : "transparent", color: numRounds === n ? C.chalk : C.ink, border: `2px solid ${C.green}` }}
                    className="px-6 py-2 text-lg font-bold uppercase rounded">
                    {n} rounds
                  </button>
                ))}
              </div>
              <p className="text-xs mt-2" style={{ color: "#5A6478" }}>{numRounds} games per player · about {numRounds === 5 ? "60–75" : "75–90"} minutes total.</p>
            </div>

            <div style={{ fontFamily: font.display }} className="text-sm font-bold uppercase mt-6">Players (seeding = entry order)</div>
            <div className="grid grid-cols-2 gap-2.5 mt-2">
              {Array.from({ length: count }).map((_, i) => (
                <div key={i} className="flex items-center gap-2">
                  <span style={{ fontFamily: font.display, color: C.gold, width: 22 }} className="text-sm font-bold text-right">{i + 1}</span>
                  <input value={names[i] || ""} onChange={(e) => { const n = [...names]; n[i] = e.target.value; setNames(n); }}
                    placeholder={`Player ${i + 1}`} maxLength={16}
                    style={{ border: `2px solid ${C.line}`, background: "#fff" }} className="rounded px-3 py-2.5 text-base w-full" />
                </div>
              ))}
            </div>

            <button onClick={start} style={{ background: C.greenDeep, color: C.chalk, fontFamily: font.display }}
              className="mt-6 w-full py-4 rounded text-2xl font-extrabold uppercase tracking-wide">
              Start the ladder
            </button>

            <ClubRecords />
          </section>
        )}

        {/* PLAY */}
        {phase === "play" && rounds[cur] && (
          <>
            <section className="pt-8">
              <div className="flex items-center justify-between flex-wrap gap-2">
                <h2 style={{ fontFamily: font.display }} className="text-2xl font-bold uppercase">Round {cur + 1} of {numRounds}</h2>
                <div className="flex gap-1.5">
                  {Array.from({ length: numRounds }).map((_, r) => (
                    <div key={r} style={{ width: 22, height: 6, borderRadius: 3, background: r < cur ? C.green : r === cur ? C.gold : C.line }} />
                  ))}
                </div>
              </div>
              <p className="text-xs mt-1" style={{ color: "#5A6478" }}>
                {cur === 0 ? "Round 1 is seeded by entry order." : "Courts re-seeded by standings — you’re matched with players at your level."}
              </p>

              <div className="mt-4 space-y-3">
                {roundPods(cur).map((pod, pi) => {
                  const done = podDone(pod);
                  const a = parsed(pod.a), b = parsed(pod.b);
                  return (
                    <div key={pi} style={{ background: "#fff", border: `2px solid ${pi === 0 ? C.gold : done ? C.green : C.line}` }} className="rounded p-3">
                      <div className="flex items-center justify-between mb-1.5">
                        <span style={{ fontFamily: font.display, color: pi === 0 ? C.gold : "#5A6478" }} className="text-sm font-extrabold uppercase tracking-wide">
                          {pi === 0 && "👑 "}{pi === 0 ? "Championship Court" : `Court ${pi + 1}`}
                        </span>
                        {done && <span style={{ color: C.green, fontFamily: font.display }} className="text-xs font-bold uppercase">Final</span>}
                      </div>
                      {[0, 1].map((side) => {
                        const won = done && ((side === 0 && a > b) || (side === 1 && b > a));
                        return (
                          <div key={side} className="flex items-center justify-between py-1.5">
                            <div className="text-sm font-semibold truncate pr-2">
                              {tName(pod.teams[side])}
                              {won && <span style={{ color: C.green }} className="ml-1">✓</span>}
                            </div>
                            <input value={side === 0 ? pod.a : pod.b} onChange={(e) => setScore(pi, side === 0 ? "a" : "b", e.target.value)}
                              inputMode="numeric" placeholder="—" aria-label={`Score for ${tName(pod.teams[side])}`}
                              style={{ border: `2px solid ${won ? C.green : C.line}`, fontFamily: font.display, background: won ? "#EAF0E6" : "#fff" }}
                              className="w-14 text-center text-xl font-bold rounded py-1" />
                          </div>
                        );
                      })}
                    </div>
                  );
                })}
                {roundByes(cur).length > 0 && (
                  <div style={{ background: "#EFE7CF", border: `2px dashed ${C.line}` }} className="rounded px-3 py-2.5">
                    <span style={{ fontFamily: font.display, color: "#5A6478" }} className="text-xs font-bold uppercase">Sitting this round · </span>
                    <span className="text-sm font-semibold">{roundByes(cur).map((p) => players[p]).join(", ")}</span>
                  </div>
                )}
              </div>

              <button onClick={advance} disabled={!roundDone(cur)}
                style={{ background: roundDone(cur) ? C.greenDeep : C.line, color: C.chalk, fontFamily: font.display }}
                className="mt-5 w-full py-4 rounded text-xl font-extrabold uppercase disabled:opacity-70">
                {cur + 1 >= numRounds ? "Finish & crown champion" : `Lock round ${cur + 1} → build round ${cur + 2}`}
              </button>
              {!roundDone(cur) && <p className="text-xs mt-2 text-center" style={{ color: "#5A6478" }}>Enter every court’s score to advance.</p>}
            </section>

            <Rung />

            <section>
              <h2 style={{ fontFamily: font.display }} className="text-2xl font-bold uppercase">Standings</h2>
              {partnerVariety && (
                <p className="text-xs mt-1" style={{ color: "#5A6478" }}>
                  Partner variety: {partnerVariety.min === partnerVariety.max
                    ? `everyone has had ${partnerVariety.min} different ${partnerVariety.min === 1 ? "partner" : "partners"}`
                    : `${partnerVariety.min}–${partnerVariety.max} different partners each`} so far.
                </p>
              )}
              <div className="mt-3"><StandingsTable /></div>
            </section>

            <Rung />

            <section>
              <h2 style={{ fontFamily: font.display }} className="text-2xl font-bold uppercase">Commentary booth</h2>
              <div className="flex gap-3 mt-3">
                <button onClick={previewRound} style={{ background: C.green, color: C.chalk, fontFamily: font.display }} className="flex-1 py-3 rounded text-lg font-bold uppercase">Preview round</button>
                <button onClick={recap} disabled={standings[0].w === 0} style={{ background: standings[0].w === 0 ? C.line : C.gold, color: C.ink, fontFamily: font.display, border: `2px solid ${C.ink}` }} className="flex-1 py-3 rounded text-lg font-bold uppercase disabled:opacity-70">Standings read</button>
              </div>
              {booth && (
                <div style={{ background: C.ink, color: C.chalk }} className="mt-4 rounded p-4">
                  <div style={{ color: C.gold, fontFamily: font.display, letterSpacing: "0.15em" }} className="text-xs font-bold uppercase mb-2">● Live — {boothTitle}</div>
                  <p className="text-sm leading-relaxed">{booth}</p>
                </div>
              )}
            </section>

            <button onClick={resetAll} style={{ border: `2px solid ${confirmReset ? C.clay : C.ink}`, color: confirmReset ? C.clay : C.ink, fontFamily: font.display }} className="mt-10 w-full py-3 rounded text-lg font-bold uppercase">
              {confirmReset ? "Tap again to confirm — starts fresh" : "New tournament"}
            </button>
          </>
        )}

        {/* DONE */}
        {phase === "done" && (
          <>
            <section className="pt-8 text-center">
              <div style={{ color: C.gold }} className="text-5xl">👑</div>
              <div style={{ fontFamily: font.display, color: "#5A6478", letterSpacing: "0.2em" }} className="text-xs font-bold uppercase mt-2">King of the Ladder</div>
              <div style={{ fontFamily: font.display }} className="text-4xl font-extrabold uppercase mt-1">
                {champs.map((p) => p.name).join(" & ")}
              </div>
              <div className="text-sm mt-1" style={{ color: "#3C4A40" }}>
                {standings[0].w}–{standings[0].l} · {standings[0].diff >= 0 ? "+" : ""}{standings[0].diff} point differential over {numRounds} rounds
              </div>
            </section>

            <div className="mt-6"><StandingsTable /></div>
            {partnerVariety && (
              <p className="text-xs mt-2 text-center" style={{ color: "#5A6478" }}>
                Partner variety: {partnerVariety.min === partnerVariety.max
                  ? `every player had ${partnerVariety.min} different partners`
                  : `${partnerVariety.min}–${partnerVariety.max} different partners per player`} across {numRounds} rounds.
              </p>
            )}

            {!logged ? (
              <button onClick={logResults} style={{ background: C.gold, color: C.ink, fontFamily: font.display, border: `2px solid ${C.ink}` }} className="mt-5 w-full py-4 rounded text-xl font-extrabold uppercase">
                Log results to ladder records
              </button>
            ) : (
              <p style={{ color: C.green, fontFamily: font.display }} className="mt-4 text-sm font-bold uppercase text-center">✓ Logged to ladder records</p>
            )}

            <Rung />
            <section>
              <button onClick={recap} style={{ background: C.ink, color: C.chalk, fontFamily: font.display }} className="w-full py-3 rounded text-lg font-bold uppercase">Read the final recap</button>
              {booth && (
                <div style={{ background: C.ink, color: C.chalk }} className="mt-4 rounded p-4">
                  <div style={{ color: C.gold, fontFamily: font.display, letterSpacing: "0.15em" }} className="text-xs font-bold uppercase mb-2">● {boothTitle}</div>
                  <p className="text-sm leading-relaxed">{booth}</p>
                </div>
              )}
            </section>

            <ClubRecords />

            <button onClick={resetAll} style={{ border: `2px solid ${confirmReset ? C.clay : C.ink}`, color: confirmReset ? C.clay : C.ink, fontFamily: font.display }} className="mt-10 w-full py-3 rounded text-lg font-bold uppercase">
              {confirmReset ? "Tap again to confirm — starts fresh" : "New tournament"}
            </button>
          </>
        )}
      </main>
    </div>
  );
}


const root = ReactDOM.createRoot(document.getElementById("root"));
root.render(<KingsLadder />);
</script>
</body>
</html>
